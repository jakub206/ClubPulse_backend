version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pilkarze_db
    environment:
      POSTGRES_DB: pilkarze_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: